# Non-secret application settings for Seahorse.
# Before startup, export OPENROUTER_API_KEY in the shell environment.

provider:
  name: openrouter
  model: google/gemini-3.1-flash-lite-preview
  timeout_seconds: 60.0

logger:
  log_dir: logs
  log_level: debug

storage:
  data_dir: data

persona:
  dir: personas
  # Required. Loads <dir>/<name>.md
  name: default

mcp:
  enabled_tools:
    - get_persona
    - get_user_profile
    - search_memory

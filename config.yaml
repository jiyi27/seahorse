# Non-secret application settings for Seahorse.
# Before startup, export OPENROUTER_API_KEY in the shell environment.

provider:
  name: openrouter
  model: google/gemini-3.1-flash-lite-preview
  timeout_seconds: 10.0

logger:
  log_dir: logs
  log_level: debug

storage:
  data_dir: data

mcp:
  enabled_tools:
    - get_user_profile
    - search_memory

memory_search:
  top_k: 3

vector_memory:
  enabled: false
  top_k: 5

embedding:
  provider: openai_compatible
  model: nomic-embed-text
  base_url: http://localhost:11434/v1
  api_key_env: OLLAMA_API_KEY
  timeout_seconds: 30.0

qdrant:
  url: http://localhost:6333
  collection_name: seahorse_memory
